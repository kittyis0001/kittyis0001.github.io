<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="This website is currently offline and unavailable.">
<title>SYSTEM OFFLINE — Access Denied</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #050510;
    --royal: #7C3AED;
    --violet: #A855F7;
    --glow: #C084FC;
    --flare: #E9D5FF;
    --white: #F8F8FF;
    --dim: rgba(248,248,255,0.45);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* ─── CUSTOM CURSOR ─── */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--glow);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, background 0.2s;
    box-shadow: 0 0 16px 4px var(--violet);
  }
  #cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid rgba(168,85,247,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease, border-color 0.2s, width 0.2s, height 0.2s;
  }

  /* ─── CANVAS BACKGROUND ─── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── AURORA LAYERS ─── */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .aurora-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    animation: aurora-drift 0s ease-in-out infinite alternate;
  }
  .ab1 {
    width: 70vw; height: 55vh;
    background: radial-gradient(ellipse, rgba(124,58,237,0.35) 0%, transparent 70%);
    top: -20%; left: -20%;
    animation: aurora-drift 14s ease-in-out infinite alternate;
    animation-delay: 0s;
  }
  .ab2 {
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(168,85,247,0.25) 0%, transparent 70%);
    top: 30%; right: -15%;
    animation: aurora-drift 18s ease-in-out infinite alternate;
    animation-delay: -5s;
  }
  .ab3 {
    width: 80vw; height: 40vh;
    background: radial-gradient(ellipse, rgba(192,132,252,0.18) 0%, transparent 70%);
    bottom: -10%; left: 10%;
    animation: aurora-drift 22s ease-in-out infinite alternate;
    animation-delay: -9s;
  }
  @keyframes aurora-drift {
    0%   { opacity: 0.6; transform: translate(0, 0) scale(1); }
    50%  { opacity: 0.9; transform: translate(3%, 4%) scale(1.06); }
    100% { opacity: 0.5; transform: translate(-3%, -2%) scale(0.96); }
  }

  /* ─── MOUSE GLOW ─── */
  #mouse-glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 65%);
    pointer-events: none;
    z-index: 2;
    transform: translate(-50%, -50%);
    transition: left 0.15s ease, top 0.15s ease;
  }

  /* ─── GRID OVERLAY ─── */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* ─── MAIN LAYOUT ─── */
  main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  /* ─── STATUS BADGE ─── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    border: 1px solid rgba(168,85,247,0.3);
    background: rgba(124,58,237,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 0.45rem 1.2rem;
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: var(--glow);
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateY(-12px);
    animation: fade-up 0.8s ease 0.3s forwards;
    box-shadow: 0 0 24px rgba(168,85,247,0.08), inset 0 0 20px rgba(168,85,247,0.04);
  }
  .status-dot {
    width: 6px; height: 6px;
    background: #FF4F6A;
    border-radius: 50%;
    box-shadow: 0 0 8px #FF4F6A;
    animation: pulse-red 2s ease infinite;
  }
  @keyframes pulse-red {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px #FF4F6A; }
    50%       { opacity: 0.4; box-shadow: 0 0 4px #FF4F6A; }
  }

  /* ─── GLASS PANEL ─── */
  .glass-panel {
    position: relative;
    padding: 3.5rem 3rem;
    border: 1px solid rgba(192,132,252,0.12);
    background: rgba(5,5,16,0.6);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 24px;
    max-width: 880px;
    width: 100%;
    box-shadow:
      0 0 0 1px rgba(168,85,247,0.06),
      0 24px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 0 60px rgba(124,58,237,0.08);
    opacity: 0;
    transform: translateY(24px) scale(0.98);
    animation: panel-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    overflow: hidden;
  }

  /* cracked-glass SVG shimmer inside panel */
  .glass-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(192,132,252,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 75% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
    pointer-events: none;
    border-radius: inherit;
  }

  /* animated glowing top border */
  .glass-panel::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet), transparent);
    animation: border-scan 4s ease-in-out infinite;
  }
  @keyframes border-scan {
    0%   { opacity: 0.3; left: 10%; right: 10%; }
    50%  { opacity: 1;   left: 2%;  right: 2%;  }
    100% { opacity: 0.3; left: 10%; right: 10%; }
  }

  /* ─── HEADLINE ─── */
  .headline {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 8vw, 5.8rem);
    line-height: 1.0;
    letter-spacing: -0.01em;
    color: var(--white);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    position: relative;
  }

  .headline-word {
    display: inline-block;
    opacity: 0;
    transform: translateY(30px) skewX(-4deg);
  }
  .headline-word:nth-child(1) { animation: word-in 0.7s cubic-bezier(0.16,1,0.3,1) 0.9s forwards; }
  .headline-word:nth-child(2) { animation: word-in 0.7s cubic-bezier(0.16,1,0.3,1) 1.1s forwards; }
  .headline-word:nth-child(3) { animation: word-in 0.7s cubic-bezier(0.16,1,0.3,1) 1.3s forwards; }
  .headline-word:nth-child(4) { animation: word-in 0.7s cubic-bezier(0.16,1,0.3,1) 1.5s forwards; }

  .headline-glow {
    display: block;
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--white) 0%, var(--flare) 40%, var(--glow) 70%, var(--violet) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(168,85,247,0.6));
    animation: glow-pulse 3s ease-in-out infinite;
  }

  .headline-solid {
    background: linear-gradient(135deg, var(--white) 0%, var(--flare) 40%, var(--glow) 70%, var(--violet) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @keyframes word-in {
    to { opacity: 1; transform: translateY(0) skewX(0deg); }
  }
  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(168,85,247,0.5)); }
    50%       { filter: drop-shadow(0 0 45px rgba(192,132,252,0.9)); }
  }

  /* ─── DIVIDER ─── */
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet), transparent);
    margin: 1.8rem auto;
    opacity: 0;
    animation: fade-up 0.6s ease 2s forwards;
  }

  /* ─── SUBTITLE ─── */
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.82rem, 2.2vw, 1.05rem);
    letter-spacing: 0.04em;
    color: var(--dim);
    line-height: 1.7;
    max-width: 440px;
    margin: 0 auto 0;
    opacity: 0;
    animation: fade-up 0.8s ease 2.1s forwards;
  }
  .subtitle strong {
    color: rgba(192,132,252,0.8);
    font-weight: 400;
  }

  /* ─── STAT ROW ─── */
  .stat-row {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-top: 2.8rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fade-up 0.8s ease 2.4s forwards;
  }
  .stat-chip {
    border: 1px solid rgba(168,85,247,0.2);
    background: rgba(124,58,237,0.07);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 0.5rem 1.1rem;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.16em;
    color: rgba(192,132,252,0.7);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .stat-chip:hover {
    border-color: rgba(168,85,247,0.5);
    box-shadow: 0 0 16px rgba(168,85,247,0.1);
  }

  /* ─── FLOATING ACCENTS ─── */
  .floaters {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }
  .floater {
    position: absolute;
    border: 1px solid rgba(168,85,247,0.15);
    border-radius: 12px;
    animation: float-orbit linear infinite;
    opacity: 0;
  }
  .f1 {
    width: 80px; height: 80px;
    top: 12%; left: 8%;
    animation-duration: 20s;
    animation-delay: 1.5s;
    transform: rotate(20deg);
  }
  .f2 {
    width: 50px; height: 50px;
    top: 65%; left: 6%;
    animation-duration: 26s;
    animation-delay: 2s;
    transform: rotate(-10deg);
    border-radius: 50%;
    background: rgba(124,58,237,0.04);
  }
  .f3 {
    width: 100px; height: 40px;
    top: 20%; right: 7%;
    animation-duration: 18s;
    animation-delay: 0.8s;
    transform: rotate(-15deg);
  }
  .f4 {
    width: 60px; height: 60px;
    top: 75%; right: 10%;
    animation-duration: 22s;
    animation-delay: 3s;
    transform: rotate(30deg);
    border-radius: 50%;
  }
  .f5 {
    width: 30px; height: 30px;
    top: 45%; left: 3%;
    animation-duration: 16s;
    animation-delay: 1s;
    border-radius: 50%;
    background: rgba(192,132,252,0.06);
  }
  @keyframes float-orbit {
    0%   { opacity: 0;    transform: translateY(0) rotate(var(--r, 0deg)); }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { opacity: 0;    transform: translateY(-25px) rotate(var(--r, 0deg)); }
  }

  /* ─── CORNER BRACKETS ─── */
  .bracket {
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(168,85,247,0.35);
    border-style: solid;
    border-width: 0;
    opacity: 0;
    animation: fade-in 0.5s ease 1.8s forwards;
  }
  .bracket.tl { top: 16px; left: 16px; border-top-width: 1.5px; border-left-width: 1.5px; border-top-left-radius: 4px; }
  .bracket.tr { top: 16px; right: 16px; border-top-width: 1.5px; border-right-width: 1.5px; border-top-right-radius: 4px; }
  .bracket.bl { bottom: 16px; left: 16px; border-bottom-width: 1.5px; border-left-width: 1.5px; border-bottom-left-radius: 4px; }
  .bracket.br { bottom: 16px; right: 16px; border-bottom-width: 1.5px; border-right-width: 1.5px; border-bottom-right-radius: 4px; }

  /* ─── FOOTER ─── */
  footer {
    position: relative;
    z-index: 10;
    padding: 2rem 1.5rem;
    text-align: center;
    opacity: 0;
    animation: fade-up 0.6s ease 2.8s forwards;
  }
  .footer-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.22em;
    color: rgba(168,85,247,0.3);
    text-transform: uppercase;
  }

  /* ─── SCAN LINE ─── */
  .scanline {
    position: fixed;
    top: -5%;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(168,85,247,0.25), transparent);
    z-index: 20;
    pointer-events: none;
    animation: scanline 7s linear infinite;
  }
  @keyframes scanline {
    0%   { top: -5%; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.5; }
    100% { top: 105%; opacity: 0; }
  }

  /* ─── LIGHT STREAKS ─── */
  .streaks {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .streak {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,132,252,0.35), transparent);
    animation: streak-fly linear infinite;
    opacity: 0;
  }
  .streak:nth-child(1) { width: 200px; top: 22%; animation-duration: 5s; animation-delay: 0.5s; }
  .streak:nth-child(2) { width: 120px; top: 58%; animation-duration: 7s; animation-delay: 2s; }
  .streak:nth-child(3) { width: 300px; top: 38%; animation-duration: 9s; animation-delay: 4s; }
  .streak:nth-child(4) { width: 80px;  top: 75%; animation-duration: 6s; animation-delay: 1s; }
  .streak:nth-child(5) { width: 160px; top: 10%; animation-duration: 8s; animation-delay: 3s; }
  @keyframes streak-fly {
    0%   { left: -30%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { left: 130%; opacity: 0; }
  }

  /* ─── KEYFRAMES ─── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    to   { opacity: 1; }
  }
  @keyframes panel-in {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─── PARTICLE CANVAS ─── */
  #particle-canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.7;
  }

  /* ─── REDUCED MOTION ─── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* ─── MOBILE ─── */
  @media (max-width: 600px) {
    .glass-panel { padding: 2.5rem 1.5rem; border-radius: 18px; }
    .stat-row { gap: 0.75rem; }
    .floater { display: none; }
    #cursor, #cursor-ring { display: none; }
    body { cursor: default; }
  }
</style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Scanline -->
<div class="scanline"></div>

<!-- Aurora background -->
<div class="aurora">
  <div class="aurora-blob ab1"></div>
  <div class="aurora-blob ab2"></div>
  <div class="aurora-blob ab3"></div>
</div>

<!-- Grid overlay -->
<div class="grid-overlay"></div>

<!-- Mouse glow -->
<div id="mouse-glow"></div>

<!-- Particle canvas -->
<canvas id="particle-canvas"></canvas>

<!-- Light streaks -->
<div class="streaks">
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
</div>

<!-- Floating accents -->
<div class="floaters">
  <div class="floater f1"></div>
  <div class="floater f2"></div>
  <div class="floater f3"></div>
  <div class="floater f4"></div>
  <div class="floater f5"></div>
</div>

<!-- MAIN CONTENT -->
<main>

  <div class="status-badge" role="status" aria-label="System Status: Offline">
    <span class="status-dot" aria-hidden="true"></span>
    SYSTEM&nbsp;OFFLINE
  </div>

  <div class="glass-panel" role="main">
    <!-- corner brackets -->
    <div class="bracket tl" aria-hidden="true"></div>
    <div class="bracket tr" aria-hidden="true"></div>
    <div class="bracket bl" aria-hidden="true"></div>
    <div class="bracket br" aria-hidden="true"></div>

    <h1 class="headline" aria-label="This site is closed">
      <span class="headline-word"><span class="headline-solid">THIS</span>&nbsp;</span>
      <span class="headline-word"><span class="headline-solid">SITE</span>&nbsp;</span>
      <span class="headline-word"><span class="headline-solid">IS</span>&nbsp;</span>
      <span class="headline-word"><span class="headline-solid">CLOSED</span></span>
    </h1>

    <div class="divider" aria-hidden="true"></div>

    <p class="subtitle">
      This website is currently <strong>unavailable</strong>.<br>
      Please&nbsp;never&nbsp;come&nbsp;back&nbsp;again.
    </p>

    <div class="stat-row" aria-hidden="true">
      <div class="stat-chip">ACCESS DENIED</div>
      <div class="stat-chip">PORTAL SEALED</div>
      <div class="stat-chip">UPTIME: 00:00:00</div>
    </div>
  </div>

</main>

<footer>
  <p class="footer-text">
    &copy; 2025 &nbsp;·&nbsp; ALL SYSTEMS TERMINATED &nbsp;·&nbsp; SIGNAL LOST
  </p>
</footer>

<script>
/* ── CURSOR ── */
const cursor     = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
const mouseGlow  = document.getElementById('mouse-glow');
let mx = window.innerWidth / 2, my = window.innerHeight / 2;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left     = mx + 'px';
  cursor.style.top      = my + 'px';
  cursorRing.style.left = mx + 'px';
  cursorRing.style.top  = my + 'px';
  mouseGlow.style.left  = mx + 'px';
  mouseGlow.style.top   = my + 'px';
});

document.querySelectorAll('.stat-chip, .status-badge').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursorRing.style.width  = '56px';
    cursorRing.style.height = '56px';
    cursorRing.style.borderColor = 'rgba(192,132,252,0.8)';
  });
  el.addEventListener('mouseleave', () => {
    cursorRing.style.width  = '';
    cursorRing.style.height = '';
    cursorRing.style.borderColor = '';
  });
});

/* ── PARTICLES ── */
const pCanvas = document.getElementById('particle-canvas');
const pc      = pCanvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = pCanvas.width  = window.innerWidth;
  H = pCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['rgba(168,85,247,', 'rgba(192,132,252,', 'rgba(124,58,237,'];

function mkParticle() {
  return {
    x:  Math.random() * W,
    y:  Math.random() * H,
    r:  Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.25,
    vy: -Math.random() * 0.4 - 0.1,
    a:  Math.random(),
    da: (Math.random() * 0.003 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
    c:  COLORS[Math.floor(Math.random() * COLORS.length)]
  };
}

for (let i = 0; i < 90; i++) particles.push(mkParticle());

/* mouse repel */
let repelX = -9999, repelY = -9999;
document.addEventListener('mousemove', e => { repelX = e.clientX; repelY = e.clientY; });

function raf() {
  pc.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    /* gentle mouse repel */
    const dx = p.x - repelX, dy = p.y - repelY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120) {
      const force = (120 - dist) / 120 * 0.6;
      p.vx += (dx / dist) * force * 0.08;
      p.vy += (dy / dist) * force * 0.08;
    }
    p.vx *= 0.98; p.vy *= 0.98;
    p.x += p.vx; p.y += p.vy;
    p.a += p.da;
    if (p.a > 1 || p.a < 0) p.da *= -1;
    if (p.y < -10 || p.x < -10 || p.x > W + 10) {
      particles[i] = mkParticle();
      particles[i].y = H + 5;
    }
    pc.beginPath();
    pc.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pc.fillStyle = p.c + Math.min(p.a * 0.85, 0.75) + ')';
    pc.fill();
  });
  requestAnimationFrame(raf);
}
raf();

/* ── HEADLINE GLOW PARALLAX ON MOUSE ── */
const panel = document.querySelector('.glass-panel');
document.addEventListener('mousemove', e => {
  const rx = (e.clientX / window.innerWidth  - 0.5) * 8;
  const ry = (e.clientY / window.innerHeight - 0.5) * 6;
  panel.style.transform = `perspective(800px) rotateY(${rx}deg) rotateX(${-ry}deg)`;
});
document.addEventListener('mouseleave', () => {
  panel.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
});
panel.style.transition = 'transform 0.25s ease';

/* ── UPTIME COUNTER ── */
const start = Date.now();
const chip  = document.querySelector('.stat-chip:last-child');
setInterval(() => {
  const s = Math.floor((Date.now() - start) / 1000);
  const h = String(Math.floor(s / 3600)).padStart(2,'0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2,'0');
  const sec = String(s % 60).padStart(2,'0');
  chip.textContent = `UPTIME: ${h}:${m}:${sec}`;
}, 1000);
</script>
</body>
</html>
