<style>

<body>

<div id="access">
<h2>Enter Access Key</h2>

<div id="accessLoader">
  <div class="loaderRing"></div>

<div id="login">

<div class="warning">⚠️ Always use incognito mode ⚠️</div>
<input id="name" class="loginInput" placeholder="Username">

<button id="loginBtn" onclick="start()">Enter Chat</button>
</div>

<div id="chat">

<div id="header">
<div id="title">Private Chat</div>
<div id="headerCenter">
<span class="iconBtn" onclick="document.getElementById('imgInput').click()">📷</span>
<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="uploadImage(this)">

<div id="voiceRecordBar">
  <div class="recLeft">

  </div>

    <span style="color:white;font-size:22px;cursor:pointer;" id="recCancelBtn">✕</span>
  </div>

</div>

  <div class="actionMenuItem" id="actionReact">😊 React</div>
  <div class="actionMenuItem" id="actionReply">↩️ Reply</div>

  <span class="reactionOption">❤️</span>
  <span class="reactionOption">😂</span>
  <span class="reactionOption">😮</span>
  <span class="reactionOption">😢</span>
  <span class="reactionOption">😑</span>
  <span class="reactionOption">🤬</span>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, push, onChildAdded, onChildChanged, remove, set, onValue, onDisconnect, update, get }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {
  apiKey: "AIzaSyA4U3FPOVILcqPpWERz6aUtOwsqHgbSCEk",
  authDomain: "private-chat-318a6.firebaseapp.com",
  databaseURL: "https://private-chat-318a6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "private-chat-318a6",
  storageBucket: "private-chat-318a6.appspot.com",
  messagingSenderId: "1082000480834",
  appId: "1:1082000480834:web:1f6871c095821e865a2bdb"
}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const BACKEND = "https://chat-backend-myvs.onrender.com"
fetch(BACKEND).catch(()=>{})

const bgCount = 59
const bgIndex = Math.floor(Math.random() * bgCount) + 1
document.body.style.backgroundImage = `url('https://raw.githubusercontent.com/kittyis0001/kittyis0001.github.io/main/bg${bgIndex}.jpg')`

let username = ""
const appStartTime = Date.now()
const statusText = document.getElementById("statusText")
const accessLoader = document.getElementById("accessLoader")
const messagesEl = document.getElementById("messages")
let seenListener = null

function scrollToBottom(){
  setTimeout(()=>{ messagesEl.scrollTop = messagesEl.scrollHeight }, 50)
}

// ─────────────────────────────────────────────
// VOICE RECORDING
// ─────────────────────────────────────────────
let mediaRecorder=null, audioChunks=[], recordedBlob=null
let recTimerInterval=null, recSeconds=0, isRecording=false

const micBtn = document.getElementById("micBtn")
const voiceRecordBar = document.getElementById("voiceRecordBar")
const voicePreviewBar = document.getElementById("voicePreviewBar")
const recTimer = document.getElementById("recTimer")
const recCancelBtn = document.getElementById("recCancelBtn")
const previewAudio = document.getElementById("previewAudio")
const previewPlayBtn = document.getElementById("previewPlayBtn")
const previewDeleteBtn = document.getElementById("previewDeleteBtn")
const previewSendBtn = document.getElementById("previewSendBtn")
const previewDuration = document.getElementById("previewDuration")

function formatRecTime(s){ return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2) }

async function startRecording(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true})
    audioChunks=[]
    mediaRecorder = new MediaRecorder(stream)
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) audioChunks.push(e.data) }
    mediaRecorder.onstop = ()=>{
      recordedBlob = new Blob(audioChunks,{type:"audio/webm"})
      previewAudio.src = URL.createObjectURL(recordedBlob)
      previewDuration.innerText = formatRecTime(recSeconds)
      voiceRecordBar.style.display="none"
      voicePreviewBar.style.display="flex"
      stream.getTracks().forEach(t=>t.stop())
    }
    mediaRecorder.start()
    isRecording=true; recSeconds=0; recTimer.innerText="0:00"
    voiceRecordBar.style.display="flex"
    recTimerInterval = setInterval(()=>{ recSeconds++; recTimer.innerText=formatRecTime(recSeconds) },1000)
  } catch(e){ alert("Microphone permission denied") }
}

function stopRecording(){
  if(mediaRecorder&&isRecording){ clearInterval(recTimerInterval); isRecording=false; mediaRecorder.stop() }
}

function cancelRecording(){
  if(mediaRecorder&&isRecording){
    clearInterval(recTimerInterval); isRecording=false
    mediaRecorder.stream.getTracks().forEach(t=>t.stop())
    mediaRecorder.stop(); recordedBlob=null
    voiceRecordBar.style.display="none"
  }
}

micBtn.addEventListener("touchstart",e=>{e.preventDefault();startRecording()},{passive:false})
micBtn.addEventListener("touchend",e=>{e.preventDefault();stopRecording()},{passive:false})
micBtn.addEventListener("mousedown",e=>{e.preventDefault();startRecording()})
micBtn.addEventListener("mouseup",()=>stopRecording())
recCancelBtn.addEventListener("click",()=>cancelRecording())

let isPlaying=false
previewPlayBtn.addEventListener("click",()=>{
  if(isPlaying){previewAudio.pause();previewPlayBtn.innerText="▶️";isPlaying=false}
  else{previewAudio.play();previewPlayBtn.innerText="⏸️";isPlaying=true}
})
previewAudio.addEventListener("ended",()=>{previewPlayBtn.innerText="▶️";isPlaying=false})
previewDeleteBtn.addEventListener("click",()=>{
  recordedBlob=null;previewAudio.src="";voicePreviewBar.style.display="none";isPlaying=false
})
previewSendBtn.addEventListener("click",async()=>{
  if(!recordedBlob) return
  previewSendBtn.disabled=true; previewSendBtn.innerText="⏳"
  try {
    const formData=new FormData()
    formData.append("file",recordedBlob,"voice.webm")
    const res=await fetch(BACKEND+"/voice",{method:"POST",body:formData})
    const data=await res.json()
    if(!data.url) throw new Error()
    push(ref(db,"messages"),{name:username,text:"__voice__"+data.url,time:Date.now(),seen:false})
    recordedBlob=null;previewAudio.src="";voicePreviewBar.style.display="none";isPlaying=false
  } catch(e){alert("Voice send failed ⚠️")}
  previewSendBtn.disabled=false;previewSendBtn.innerText="➤"
})

// ─────────────────────────────────────────────
// TYPING INDICATOR
// ─────────────────────────────────────────────
const typingIndicator = document.getElementById("typingIndicator")
let typingTimeout=null
const msgBox = document.getElementById("msg")

msgBox.addEventListener("input",function(){
  this.style.height="auto"
  this.style.height=Math.min(this.scrollHeight,120)+"px"
  if(username){
    set(ref(db,"typing/"+username),true)
    clearTimeout(typingTimeout)
    typingTimeout=setTimeout(()=>set(ref(db,"typing/"+username),false),2000)
  }
})

msgBox.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}
})

// ─────────────────────────────────────────────
// REPLY
// ─────────────────────────────────────────────
let replyingTo = null

const replyBar = document.getElementById("replyBar")
const replyBarName = document.getElementById("replyBarName")
const replyBarText = document.getElementById("replyBarText")
const replyBarClose = document.getElementById("replyBarClose")

replyBarClose.addEventListener("click",()=>{
  replyingTo=null; replyBar.style.display="none"
})

function startReply(key, name, text){
  replyingTo={key,name,text}
  replyBarName.innerText = name==="katis1"?"Kat":"Kitty"
  replyBarText.innerText = text.startsWith("__voice__")?"🎤 Voice message":text.substring(0,60)
  replyBar.style.display="flex"
  msgBox.focus()
}

function addSwipeReply(div, key, message){
  let startX=0, moved=false
  div.addEventListener("touchstart",e=>{ startX=e.touches[0].clientX; moved=false },{passive:true})
  div.addEventListener("touchmove",e=>{
    const dx=e.touches[0].clientX-startX
    if(Math.abs(dx)>10){ moved=true; const clamp=Math.min(Math.max(dx,-60),60); div.style.transform=`translateX(${clamp}px)` }
  },{passive:true})
  div.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-startX
    div.style.transform=""
    if(Math.abs(dx)>50&&moved) startReply(key,message.name,message.text)
  },{passive:true})
}

// ─────────────────────────────────────────────
// EDIT
// ─────────────────────────────────────────────
let editingKey = null

const editBar = document.getElementById("editBar")
const editBarClose = document.getElementById("editBarClose")

editBarClose.addEventListener("click",()=>{
  editingKey=null; editBar.style.display="none"
  msgBox.value=""; msgBox.style.height="auto"
  document.getElementById("sendBtn").innerText="➤"
})

function startEdit(key, currentText){
  editingKey=key
  msgBox.value=currentText
  msgBox.style.height="auto"
  msgBox.style.height=Math.min(msgBox.scrollHeight,120)+"px"
  editBar.style.display="flex"
  document.getElementById("sendBtn").innerText="✓"
  msgBox.focus()
}

// ─────────────────────────────────────────────
// ACTION MENU
// ─────────────────────────────────────────────
const actionMenu = document.getElementById("actionMenu")
const reactionPicker = document.getElementById("reactionPicker")
let currentMsgKey=null, currentMsgIsMe=false, currentMsgData=null
let longPressTimer=null

function showActionMenu(msgDiv, key, isMe, message){
  currentMsgKey=key; currentMsgIsMe=isMe; currentMsgData=message
  document.getElementById("actionEdit").style.display=(isMe&&!message.text.startsWith("__voice__"))?"flex":"none"
  document.getElementById("actionDelete").style.display=isMe?"flex":"none"
  actionMenu.style.display="flex"
  const rect=msgDiv.getBoundingClientRect()
  let top=rect.top-10
  let left=isMe?rect.right-160:rect.left
  if(top+200>window.innerHeight) top=rect.bottom-200
  if(top<10) top=10
  if(left+160>window.innerWidth) left=window.innerWidth-165
  if(left<5) left=5
  actionMenu.style.top=top+"px"
  actionMenu.style.left=left+"px"
}

document.addEventListener("click",e=>{
  if(!actionMenu.contains(e.target)&&!reactionPicker.contains(e.target)){
    actionMenu.style.display="none"
    reactionPicker.style.display="none"
    currentMsgKey=null
  }
})

// ✅ BUG FIX — position আগে নাও, তারপর actionMenu hide করো
document.getElementById("actionReact").addEventListener("click",e=>{
  e.stopPropagation()
  if(!currentMsgKey) return
  const am = actionMenu.getBoundingClientRect()
  let rTop = am.top - 60
  let rLeft = am.left
  if(rTop < 10) rTop = am.bottom + 8
  if(rLeft + 300 > window.innerWidth) rLeft = window.innerWidth - 310
  if(rLeft < 5) rLeft = 5

  reactionPicker.style.left=rLeft+"px"
})

function renderReactions(reactions,msgKey){
  if(!reactions) return ""
  const counts={}
  Object.values(reactions).forEach(e=>{counts[e]=(counts[e]||0)+1})
  const myReaction=reactions[username]||null
  let html='<div class="reactionBar">'
  Object.entries(counts).forEach(([emoji,count])=>{
    const active=myReaction===emoji?"border:1.5px solid #075E54;":""
    html+=`<span class="reactionBadge" style="${active}" onclick="toggleReaction('${msgKey}','${emoji}')">${emoji}${count>1?" "+count:""}</span>`
  })
  return html+"</div>"
}

window.toggleReaction=async function(msgKey,emoji){
  const snap=await get(ref(db,"messages/"+msgKey+"/reactions"))
  const reactions=snap.val()||{}
  await update(ref(db,"messages/"+msgKey+"/reactions"),{
    [username]:reactions[username]===emoji?null:emoji
  })
}

window.unlock=async function(){
  let key=document.getElementById("key").value
  accessLoader.style.display="flex"
  try {
    const res=await fetch(BACKEND+"/check-access",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key})})
    const data=await res.json()
    accessLoader.style.display="none"
    if(!data.ok){document.body.innerHTML="";return}
  } catch(e){accessLoader.style.display="none";document.body.innerHTML="";return}
  document.getElementById("access").style.display="none"
  document.getElementById("login").style.display="block"
}

window.start=async function(){
  username=document.getElementById("name").value.trim()
  let password=document.getElementById("code").value
  if(!username||!password){alert("Enter username & password");return}

  const btn=document.getElementById("loginBtn")
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Logging in...'

  let battery="Unknown"
  try{const b=await navigator.getBattery();battery=Math.round(b.level*100)+"%"+(b.charging?" ⚡ Charging":"")}catch(e){}

  let data
  try{
    const res=await fetch(BACKEND+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password,battery})})
    data=await res.json()
  }catch(e){btn.disabled=false;btn.innerHTML="Enter Chat";alert("Server waking up... try again in a moment");return}

  if(!data.ok){btn.disabled=false;btn.innerHTML="Enter Chat";alert("Access denied");return}

  localStorage.setItem("chatUser",username)
  document.getElementById("login").style.display="none"
  document.getElementById("chat").style.display="flex"

  const userRef=ref(db,"status/"+username)
  set(userRef,{online:true,last:Date.now()})
  onDisconnect(userRef).set({online:false,last:Date.now()})
  onDisconnect(ref(db,"typing/"+username)).set(false)

  document.addEventListener("visibilitychange",()=>{
    if(document.hidden) set(userRef,{online:false,last:Date.now()})
    else set(userRef,{online:true,last:Date.now()})
  })
  setInterval(()=>set(userRef,{online:true,last:Date.now()}),10000)

  const otherUser=username=="katis1"?"kittyis0001":"katis1"
  const otherName=otherUser==="kittyis0001"?"Kitty":"Kat"

  onValue(ref(db,"typing/"+otherUser),snap=>{
    const isTyping=snap.val()
    typingIndicator.style.display=isTyping?"block":"none"
    typingIndicator.innerText=isTyping?otherName+" is typing...":""
  })

  markSeenMessages()
}

window.send=async function(){
  const text=msgBox.value.trim()
  if(!text) return

  if(editingKey){
    await update(ref(db,"messages/"+editingKey),{text:text,edited:true})
    editingKey=null; editBar.style.display="none"
    document.getElementById("sendBtn").innerText="➤"
    msgBox.value=""; msgBox.style.height="auto"
    return
  }

  const msgData={name:username,text:text,time:Date.now(),seen:false}

  if(replyingTo){
    msgData.replyTo={
      key:replyingTo.key,
      name:replyingTo.name,
      text:replyingTo.text.startsWith("__voice__")?"🎤 Voice message":replyingTo.text.substring(0,80)
    }
    replyingTo=null; replyBar.style.display="none"
  }

  push(ref(db,"messages"),msgData)
  msgBox.value=""; msgBox.style.height="auto"
  set(ref(db,"typing/"+username),false)
  clearTimeout(typingTimeout)
}

function isImageUrl(text){
  return /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(text)&&
    !text.includes("instagram.com")&&!text.includes("youtube.com")&&
    !text.includes("youtu.be")&&!text.includes("facebook.com")&&
    !text.includes("twitter.com")&&!text.includes("tiktok.com")
}

function createVoicePlayer(url){
  const audio=new Audio(url)
  let playing=false,progressInterval=null
  const wrapper=document.createElement("div");wrapper.className="voiceMsg"
  const playBtn=document.createElement("button");playBtn.className="voicePlayBtn";playBtn.innerText="▶"
  const wave=document.createElement("div");wave.className="voiceWave"
  const fill=document.createElement("div");fill.className="voiceWaveFill";wave.appendChild(fill)
  const dur=document.createElement("span");dur.className="voiceDuration";dur.innerText="0:00"
  audio.addEventListener("loadedmetadata",()=>{ if(isFinite(audio.duration)) dur.innerText=formatRecTime(Math.round(audio.duration)) })
  playBtn.addEventListener("click",()=>{
    if(playing){audio.pause();playBtn.innerText="▶";clearInterval(progressInterval);playing=false}
    else{
      audio.play();playBtn.innerText="⏸";playing=true
      progressInterval=setInterval(()=>{
        if(audio.duration){fill.style.width=(audio.currentTime/audio.duration*100)+"%";dur.innerText=formatRecTime(Math.round(audio.currentTime))}
      },100)
    }
  })
  audio.addEventListener("ended",()=>{
    playBtn.innerText="▶";fill.style.width="0%";playing=false;clearInterval(progressInterval)
    if(isFinite(audio.duration)) dur.innerText=formatRecTime(Math.round(audio.duration))
  })
  wrapper.appendChild(playBtn);wrapper.appendChild(wave);wrapper.appendChild(dur)
  return wrapper
}

function buildTimeHtml(message,isMe){
  const t=new Date(message.time).getHours()+":"+("0"+new Date(message.time).getMinutes()).slice(-2)
  const editedLabel=message.edited?`<span class="editedLabel">(edited)</span>`:""
  const tick=isMe?(message.seen?"<span style='color:#001aff'>✔✔</span>":"✔"):""
  return `${t} ${editedLabel} ${tick}`
}

function createMessage(message,key){
  const me=localStorage.getItem("chatUser")||username
  const isMe=message.name==me
  const displayName=message.name==="katis1"?"Kat":"Kitty"

  const div=document.createElement("div")
  div.classList.add("msg")
  div.id=key
  div.classList.add(isMe?"me":"other")

  if(message.deleted){
    div.innerHTML=`<span style="color:#aaa;font-style:italic;font-size:13px;">🚫 Message deleted</span><div class="time">${buildTimeHtml(message,isMe)}</div>`
    messagesEl.appendChild(div)
    scrollToBottom()
    return
  }

  let replyHtml=""
  if(message.replyTo){
    const rName=message.replyTo.name==="katis1"?"Kat":"Kitty"
    replyHtml=`<div class="replyQuote"><div class="replyName">${rName}</div>${message.replyTo.text||""}</div>`
  }

  div.innerHTML=`<b>${displayName}</b><br>${replyHtml}<div class="time">${buildTimeHtml(message,isMe)}</div>${renderReactions(message.reactions,key)}`

  const timeDiv=div.querySelector(".time")

  if(message.text.startsWith("__voice__")){
    div.insertBefore(createVoicePlayer(message.text.replace("__voice__","")),timeDiv)
  } else if(isImageUrl(message.text)){
    const img=document.createElement("img")
    img.src=message.text
    img.style.cssText="max-width:200px;border-radius:8px;display:block;cursor:pointer;"
    img.onclick=function(){showImage(this.src)}
    div.insertBefore(img,timeDiv)
  } else {
    const textNode=document.createElement("span")
    textNode.className="msgText"
    textNode.innerHTML=message.text.replace(/\n/g,"<br>").replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:#075E54;word-break:break-all;">$1</a>')
    div.insertBefore(textNode,timeDiv)
  }

  div.addEventListener("touchstart",e=>{
    longPressTimer=setTimeout(()=>showActionMenu(div,key,isMe,message),600)
  },{passive:true})
  div.addEventListener("touchend",()=>clearTimeout(longPressTimer))
  div.addEventListener("touchmove",()=>clearTimeout(longPressTimer))
  div.addEventListener("mousedown",()=>{ longPressTimer=setTimeout(()=>showActionMenu(div,key,isMe,message),600) })
  div.addEventListener("mouseup",()=>clearTimeout(longPressTimer))

  addSwipeReply(div,key,message)

  messagesEl.appendChild(div)
  scrollToBottom()
}

onChildAdded(ref(db,"messages"),data=>{
  createMessage(data.val(),data.key)
  const message=data.val()
  if(message.time>appStartTime&&message.name==="kittyis0001"){
    const now=new Date()
    const time=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    fetch(BACKEND+"/notify",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:message.text.startsWith("__voice__")?"🎤 Voice message":message.text,time})
    }).catch(()=>{})
  }
})

onChildChanged(ref(db,"messages"),data=>{
  const me=localStorage.getItem("chatUser")||username
  const message=data.val()
  const key=data.key
  const msgDiv=document.getElementById(key)
  if(!msgDiv) return

  if(message.deleted){
    msgDiv.innerHTML=`<span style="color:#aaa;font-style:italic;font-size:13px;">🚫 Message deleted</span><div class="time">${buildTimeHtml(message,message.name==me)}</div>`
    return
  }

  const timeDiv=msgDiv.querySelector(".time")
  if(timeDiv) timeDiv.innerHTML=buildTimeHtml(message,message.name==me)

  if(message.edited){
    const textSpan=msgDiv.querySelector(".msgText")
    if(textSpan){
      textSpan.innerHTML=message.text.replace(/\n/g,"<br>").replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:#075E54;word-break:break-all;">$1</a>')
    }
  }

  const reactionBar=msgDiv.querySelector(".reactionBar")
  const newReactionHtml=renderReactions(message.reactions,key)
  if(reactionBar) reactionBar.outerHTML=newReactionHtml||""
  else if(newReactionHtml) msgDiv.insertAdjacentHTML("beforeend",newReactionHtml)
})

function markSeenMessages(){
  if(seenListener) return
  seenListener=onValue(ref(db,"messages"),snap=>{
    const data=snap.val()
    if(!data) return
    Object.keys(data).forEach(key=>{
      const msg=data[key]
      if(msg.name!=username&&!msg.seen&&!msg.deleted) update(ref(db,"messages/"+key),{seen:true})
    })
  })
}

function formatTime(ts){
  return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true})
}

onValue(ref(db,"status"),snap=>{
  const data=snap.val()
  if(!data) return
  const otherUser=username=="katis1"?"kittyis0001":"katis1"
  if(data[otherUser]){
    const last=data[otherUser].last
    const diff=Date.now()-last
    if(diff<12000){statusText.innerText="Online";return}
    const now=new Date(),d=new Date(last)
    const isToday=now.toDateString()===d.toDateString()
    const yesterday=new Date();yesterday.setDate(now.getDate()-1)
    const isYesterday=yesterday.toDateString()===d.toDateString()
    const time=formatTime(last)
    if(isToday) statusText.innerText="Last seen today at "+time
    else if(isYesterday) statusText.innerText="Last seen yesterday at "+time
    else statusText.innerText="Last seen "+d.getDate()+" "+d.toLocaleString('default',{month:'short'})+" at "+time
  }
})

  const m=document.getElementById("menuBox")

}

window.deleteAll=function(){

}

const imgViewer=document.getElementById("imgViewer")
const fullImg=document.getElementById("fullImg")
let imgScale=1,touchStartDist=0,touchStartScale=1

imgViewer.addEventListener("touchstart",e=>{
  if(e.touches.length===2){
    touchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)
    touchStartScale=imgScale
  }
},{passive:true})

imgViewer.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    e.preventDefault()
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)
    imgScale=Math.min(Math.max(touchStartScale*(dist/touchStartDist),1),4)
    fullImg.style.transform="scale("+imgScale+")"
  }
},{passive:false})

imgViewer.addEventListener("click",e=>{
  if(e.target.id==="imgViewer"){imgViewer.style.display="none";imgScale=1;fullImg.style.transform="scale(1)"}
})

fullImg.addEventListener("click",e=>{
  e.stopPropagation()
  imgScale=imgScale===1?2.5:1
  fullImg.style.transform="scale("+imgScale+")"
  fullImg.style.cursor=imgScale===1?"zoom-in":"zoom-out"
})

window.showImage=function(src){
  imgScale=1;fullImg.src=src
  fullImg.style.transform="scale(1)"
  fullImg.style.transition="transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)"
  fullImg.style.cursor="zoom-in"
  imgViewer.style.display="flex"
}

    push(ref(db,"messages"),{name:username,text:data.url,time:Date.now(),seen:false})

}
