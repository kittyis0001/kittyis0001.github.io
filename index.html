<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, push, onChildAdded, onChildChanged, remove, set, onValue, onDisconnect, update } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {
apiKey: "AIzaSyA4U3FPOVILcqPpWERz6aUtOwsqHgbSCEk",
authDomain: "private-chat-318a6.firebaseapp.com",
databaseURL: "https://private-chat-318a6-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "private-chat-318a6",
storageBucket: "private-chat-318a6.appspot.com",
messagingSenderId: "1082000480834",
appId: "1:1082000480834:web:1f6871c095821e865a2bdb"
}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

let username=""

/* ✅ FIX ADDED HERE */
const statusText = document.getElementById("statusText")

window.unlock=function(){
let key=document.getElementById("key").value
if(key!="67"){
document.body.innerHTML=""
return
}
document.getElementById("access").style.display="none"
document.getElementById("login").style.display="block"
}

window.start=function(){

username=document.getElementById("name").value
localStorage.setItem("chatUser", username)

let code=document.getElementById("code").value

let users={
"a2F0aXMx":"8822",
"a2l0dHlpczAwMDE=":"9911"
}

if(users[btoa(username)]!=code){
alert("Access denied")
return
}

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

const userRef=ref(db,"status/"+username)

set(userRef,{online:true,last:Date.now()})
onDisconnect(userRef).set({online:false,last:Date.now()})

document.addEventListener("visibilitychange",()=>{
if(document.hidden){
set(userRef,{online:false,last:Date.now()})
}else{
set(userRef,{online:true,last:Date.now()})
}
})

setInterval(()=>{
set(userRef,{online:true,last:Date.now()})
},10000)

markSeenMessages()
}

window.send=function(){
let text=document.getElementById("msg").value.trim()
if(text=="") return
push(ref(db,"messages"),{name:username,text:text,time:Date.now(),seen:false})
document.getElementById("msg").value=""
}

function createMessage(message,key){

let me = localStorage.getItem("chatUser") || username

let displayName = message.name
if(message.name === "katis1") displayName = "Kat"
if(message.name === "kittyis0001") displayName = "Kitty"

let div=document.createElement("div")
div.classList.add("msg")
div.id=key

if(message.name==me){div.classList.add("me")}else{div.classList.add("other")}

let time=new Date(message.time)
let t=time.getHours()+":"+("0"+time.getMinutes()).slice(-2)

let text=message.text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>')

let tick=""
if(message.name==me){
tick = message.seen ? "<span style='color:#001aff'>✔✔</span>" : "✔"
}

div.innerHTML="<b>"+displayName+"</b><br>"+text+
"<div class='time'>"+t+" "+tick+"</div>"

document.getElementById("messages").appendChild(div)
document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight
}

onChildAdded(ref(db,"messages"),d=>createMessage(d.val(),d.key))

/* 🔥 TELEGRAM FEATURE (ADDED ONLY) */
onChildAdded(ref(db,"messages"),(data)=>{

let message = data.val()

if(message.name === "kittyis0001"){

let now = new Date()
let time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})

let text = `💬 Kitty:
${message.text}

🕒 Today at ${time}`

fetch("https://api.telegram.org/bot8706773948:AAGEEWhwYeP2e44k73DBFzQrEaFi5lGZj1c/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"8782681794",
text:text
})
})

}

})

onChildChanged(ref(db,"messages"),function(data){

let me = localStorage.getItem("chatUser") || username

let message=data.val()
let key=data.key
let msgDiv=document.getElementById(key)

if(msgDiv && message.name==me){

let tick = message.seen ? "<span style='color:#001aff'>✔✔</span>" : "✔"

msgDiv.querySelector(".time").innerHTML =
msgDiv.querySelector(".time").innerHTML.split(" ")[0] + " " + tick

}

})

function markSeenMessages(){
onValue(ref(db,"messages"),(snap)=>{
let data=snap.val()
if(!data) return
Object.keys(data).forEach(key=>{
let msg=data[key]
if(msg.name!=username && !msg.seen){
update(ref(db,"messages/"+key),{seen:true})
}
})
})
}

function formatTime(ts){
let d=new Date(ts)
return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
}

onValue(ref(db,"status"),(snap)=>{
let data=snap.val()
if(!data) return

let otherUser = username=="katis1" ? "kittyis0001" : "katis1"

if(data[otherUser]){

let last = data[otherUser].last
let diff = Date.now() - last

if(diff < 12000){
statusText.innerText="Online"
return
}

let now=new Date()
let d=new Date(last)

let isToday = now.toDateString() === d.toDateString()

let yesterday=new Date()
yesterday.setDate(now.getDate()-1)
let isYesterday = yesterday.toDateString() === d.toDateString()

let time=formatTime(last)

if(isToday){
statusText.innerText="Last seen today at "+time
}else if(isYesterday){
statusText.innerText="Last seen yesterday at "+time
}else{
let date=d.getDate()+" "+d.toLocaleString('default',{month:'short'})
statusText.innerText="Last seen "+date+" at "+time
}

}
})

</script>
