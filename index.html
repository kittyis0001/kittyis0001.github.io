<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:url('Qe0hvO9ST0yp18ylzejiMQ.webp') no-repeat center;
background-size:cover;
}

/* LOGIN */
#overlay{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.5);
}

.card{
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
background:#f1f1f1;
}

button{
width:90%;
padding:12px;
border:none;
border-radius:25px;
background:#128C7E;
color:white;
}

/* CHAT */
#chat{
display:none;
height:100vh;
flex-direction:column;
background:#e5ddd5;
}

#header{
background:#075E54;
color:white;
padding:10px;
}

#status{
font-size:12px;
}

#typing{
font-size:11px;
color:#ccc;
}

/* MESSAGE */
#messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:70%;
padding:8px;
margin:5px;
border-radius:10px;
}

.me{
background:#dcf8c6;
align-self:flex-end;
}

.other{
background:white;
align-self:flex-start;
}

.name{
font-size:12px;
font-weight:bold;
}

.time{
font-size:10px;
text-align:right;
color:gray;
}

.seen{
font-size:11px;
color:blue;
text-align:right;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
background:#ece5dd;
}

#msg{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.sendBtn,.emojiBtn{
background:#128C7E;
color:white;
border:none;
padding:10px;
border-radius:50%;
margin:3px;
}

</style>
</head>

<body>

<div id="overlay">

<div id="access" class="card">
<h2>Access</h2>
<input id="key" placeholder="Enter Key">
<button onclick="unlock()">Enter</button>
</div>

<div id="login" class="card" style="display:none">
<h2>Login</h2>
<input id="name" placeholder="Username">
<input id="code" placeholder="Password">
<button onclick="start()">Enter Chat</button>
</div>

</div>

<div id="chat">

<div id="header">
Private Chat
<div id="status">Offline</div>
<div id="typing"></div>
</div>

<div id="messages"></div>

<div id="inputArea">
<button class="emojiBtn" onclick="addEmoji()">😊</button>
<input id="msg" oninput="typing()" placeholder="Type message">
<button class="sendBtn" onclick="send()">➤</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, push, onChildAdded, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig={
apiKey:"AIzaSyA4U3FPOVILcqPpWERz6aUtOwsqHgbSCEk",
databaseURL:"https://private-chat-318a6-default-rtdb.asia-southeast1.firebasedatabase.app"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let username=""

/* LOGIN */
window.unlock=function(){
if(document.getElementById("key").value!="67"){
alert("Wrong key")
return
}
access.style.display="none"
login.style.display="block"
}

window.start=function(){

username=document.getElementById("name").value.trim()
let code=document.getElementById("code").value.trim()

let users={
"a2F0aXMx":"8822",
"a2l0dHlpczAwMDE=":"9911"
}

if(users[btoa(username)]!=code){
alert("Access denied")
return
}

overlay.style.display="none"
chat.style.display="flex"

/* ONLINE */
set(ref(db,"status/"+username),{
online:true,
last:Date.now(),
typing:false
})

window.addEventListener("beforeunload",()=>{
set(ref(db,"status/"+username),{
online:false,
last:Date.now(),
typing:false
})
})

watchStatus()
watchTyping()
}

/* SEND */
window.send=function(){

let text=msg.value.trim()
if(!text) return

push(ref(db,"messages"),{
name:username,
text:text,
time:Date.now(),
seen:false
})

msg.value=""
set(ref(db,"status/"+username+"/typing"),false)
}

/* RECEIVE */
onChildAdded(ref(db,"messages"),snap=>{

let m=snap.val()
let key=snap.key

let div=document.createElement("div")
div.classList.add("msg")

if(m.name==username){
div.classList.add("me")
}else{
div.classList.add("other")

/* SEEN UPDATE */
update(ref(db,"messages/"+key),{seen:true})
}

let text=m.text.replace(
/(https?:\/\/[^\s]+)/g,
'<a href="$1" target="_blank">$1</a>'
)

let time=new Date(m.time)
let t=time.getHours()+":"+("0"+time.getMinutes()).slice(-2)

let seenText = (m.name==username && m.seen) ? "✔✔ Seen" : ""

div.innerHTML=
"<div class='name'>"+m.name+"</div>"+
text+
"<div class='time'>"+t+"</div>"+
"<div class='seen'>"+seenText+"</div>"

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
})

/* STATUS */
function watchStatus(){
onValue(ref(db,"status"),snap=>{
let data=snap.val()
for(let u in data){
if(u!=username){
if(data[u].online){
status.innerText="Online"
}else{
let min=Math.floor((Date.now()-data[u].last)/60000)
status.innerText="Last seen "+min+" min ago"
}
}
}
})
}

/* TYPING */
window.typing=function(){
set(ref(db,"status/"+username+"/typing"),true)

setTimeout(()=>{
set(ref(db,"status/"+username+"/typing"),false)
},2000)
}

function watchTyping(){
onValue(ref(db,"status"),snap=>{
let data=snap.val()
for(let u in data){
if(u!=username){
if(data[u].typing){
typing.innerText="typing..."
}else{
typing.innerText=""
}
}
}
})
}

/* EMOJI */
window.addEmoji=function(){
msg.value+="😊"
}

</script>

</body>
</html>
