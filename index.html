<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITE CLOSED</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #3b82f6;
    --violet: #8b5cf6;
    --cyan: #06b6d4;
    --white: #ffffff;
    --bg: #000000;
    --bg2: #05050f;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
    mix-blend-mode: screen;
  }
  #cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid rgba(59,130,246,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease, width 0.25s ease, height 0.25s ease, opacity 0.3s ease;
  }
  #cursor-glow {
    position: fixed;
    width: 200px; height: 200px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    transition: transform 0.4s ease;
  }

  /* Canvas for particles */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* Aurora background */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .aurora-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.18;
    animation: auroraFloat 12s ease-in-out infinite alternate;
  }
  .aurora-blob:nth-child(1) {
    width: 700px; height: 500px;
    background: radial-gradient(circle, #3b82f6, #8b5cf6);
    top: -15%; left: -10%;
    animation-duration: 14s;
  }
  .aurora-blob:nth-child(2) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #06b6d4, #3b82f6);
    bottom: -20%; right: -10%;
    animation-duration: 18s;
    animation-delay: -4s;
  }
  .aurora-blob:nth-child(3) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #8b5cf6, #ec4899);
    top: 40%; left: 50%;
    transform: translate(-50%,-50%);
    animation-duration: 22s;
    animation-delay: -8s;
    opacity: 0.1;
  }

  @keyframes auroraFloat {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(60px,-40px) scale(1.05); }
    66%  { transform: translate(-30px,50px) scale(0.95); }
    100% { transform: translate(40px,20px) scale(1.02); }
  }

  /* Grid lines */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
  }

  /* Scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    from { background-position: 0 0; }
    to   { background-position: 0 100px; }
  }

  /* Main stage */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* Top bar */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid rgba(59,130,246,0.08);
    background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    backdrop-filter: blur(10px);
    animation: fadeInDown 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s both;
  }
  .topbar-logo {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  .topbar-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ef4444;
    box-shadow: 0 0 8px #ef4444, 0 0 16px rgba(239,68,68,0.5);
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.6; transform: scale(0.8); }
  }

  /* Timestamp */
  .timestamp {
    font-family: 'Inter', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
  }

  /* Main headline wrapper */
  .headline-wrap {
    text-align: center;
    position: relative;
    animation: fadeInUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.8s both;
  }

  /* Eyebrow */
  .eyebrow {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.5em;
    color: rgba(59,130,246,0.8);
    text-transform: uppercase;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    animation: fadeInUp 1.2s cubic-bezier(0.16,1,0.3,1) 1s both;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    display: block;
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.6));
  }
  .eyebrow::after { transform: scaleX(-1); }

  /* Main text */
  .headline {
    font-size: clamp(3rem, 9vw, 10rem);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: #fff;
    text-transform: uppercase;
    position: relative;
    user-select: none;
  }

  /* Each line of headline */
  .hl-line {
    display: block;
    position: relative;
    overflow: visible;
  }

  /* Glitch effect per letter */
  .gl {
    display: inline-block;
    position: relative;
    animation: letterReveal 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  /* Staggered delays for each letter group */
  .hl-line:nth-child(1) .gl { animation-delay: calc(1.2s + var(--i) * 0.06s); }
  .hl-line:nth-child(2) .gl { animation-delay: calc(1.5s + var(--i) * 0.06s); }
  .hl-line:nth-child(3) .gl { animation-delay: calc(1.8s + var(--i) * 0.06s); }

  @keyframes letterReveal {
    0%   { opacity: 0; transform: translateY(30px) skewX(-5deg); filter: blur(8px); }
    100% { opacity: 1; transform: translateY(0) skewX(0); filter: blur(0); }
  }

  /* Glitch layers on the whole headline */
  .headline::before,
  .headline::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    font-size: inherit;
    font-weight: inherit;
    line-height: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    white-space: pre-line;
    text-align: center;
  }
  .headline::before {
    color: rgba(59,130,246,0.8);
    animation: glitchA 5s infinite;
    clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%);
  }
  .headline::after {
    color: rgba(139,92,246,0.8);
    animation: glitchB 5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
  }

  @keyframes glitchA {
    0%,92%,100% { transform: translate(0,0); opacity: 0; }
    93%          { transform: translate(-3px,1px); opacity: 1; }
    94%          { transform: translate(3px,-1px); opacity: 1; }
    95%          { transform: translate(-2px,2px); opacity: 1; }
    96%          { transform: translate(0,0); opacity: 0; }
  }
  @keyframes glitchB {
    0%,93%,100% { transform: translate(0,0); opacity: 0; }
    94%          { transform: translate(2px,-2px); opacity: 1; }
    95%          { transform: translate(-3px,1px); opacity: 1; }
    96%          { transform: translate(1px,1px); opacity: 1; }
    97%          { transform: translate(0,0); opacity: 0; }
  }

  /* Neon glow text shadow, animated */
  .glow-text {
    text-shadow:
      0 0 30px rgba(59,130,246,0.4),
      0 0 80px rgba(59,130,246,0.2),
      0 0 160px rgba(139,92,246,0.1);
    animation: glowPulse 3s ease-in-out infinite alternate;
  }
  @keyframes glowPulse {
    0%   { text-shadow: 0 0 30px rgba(59,130,246,0.4), 0 0 80px rgba(59,130,246,0.2), 0 0 160px rgba(139,92,246,0.1); }
    100% { text-shadow: 0 0 50px rgba(59,130,246,0.7), 0 0 120px rgba(139,92,246,0.4), 0 0 200px rgba(6,182,212,0.15); }
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 2.5rem auto;
    width: fit-content;
    animation: fadeIn 1.2s cubic-bezier(0.16,1,0.3,1) 2.4s both;
  }
  .div-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), transparent);
  }
  .div-diamond {
    width: 6px; height: 6px;
    background: var(--blue);
    transform: rotate(45deg);
    box-shadow: 0 0 10px var(--blue), 0 0 20px rgba(59,130,246,0.5);
  }

  /* Subtext */
  .subtext {
    text-align: center;
    animation: fadeInUp 1.2s cubic-bezier(0.16,1,0.3,1) 2.6s both;
  }
  .subtext p {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    line-height: 2;
  }
  .subtext p:first-child { color: rgba(255,255,255,0.5); }

  /* Glass card floating */
  .glass-card {
    position: fixed;
    pointer-events: none;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(12px);
    z-index: 5;
    animation: floatCard 8s ease-in-out infinite alternate;
  }
  .glass-card:nth-child(1) {
    width: 140px; height: 80px;
    top: 18%; left: 8%;
    animation-duration: 10s;
  }
  .glass-card:nth-child(2) {
    width: 100px; height: 60px;
    bottom: 22%; right: 9%;
    animation-duration: 14s;
    animation-delay: -3s;
  }
  .glass-card:nth-child(3) {
    width: 70px; height: 70px;
    top: 55%; left: 6%;
    animation-duration: 11s;
    animation-delay: -6s;
    border-radius: 50%;
  }
  .glass-card:nth-child(4) {
    width: 120px; height: 50px;
    top: 25%; right: 7%;
    animation-duration: 13s;
    animation-delay: -2s;
  }
  @keyframes floatCard {
    0%   { transform: translateY(0) rotate(0deg); }
    50%  { transform: translateY(-20px) rotate(1deg); }
    100% { transform: translateY(8px) rotate(-0.5deg); }
  }

  /* Decorative corner brackets */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    z-index: 15;
    pointer-events: none;
    animation: fadeIn 1.5s ease 2s both;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: rgba(59,130,246,0.5);
  }
  .corner::before { width: 100%; height: 1px; }
  .corner::after  { width: 1px; height: 100%; }
  .corner.tl { top: 2rem; left: 2rem; }
  .corner.tr { top: 2rem; right: 2rem; transform: scaleX(-1); }
  .corner.bl { bottom: 2rem; left: 2rem; transform: scaleY(-1); }
  .corner.br { bottom: 2rem; right: 2rem; transform: scale(-1); }

  /* Bottom bar */
  .bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    border-top: 1px solid rgba(59,130,246,0.06);
    background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    animation: fadeInUp 1.2s cubic-bezier(0.16,1,0.3,1) 3s both;
  }
  .bottombar-text {
    font-family: 'Inter', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
  }
  .coord-display {
    font-family: 'Inter', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: rgba(59,130,246,0.4);
  }

  /* Noise overlay */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    animation: noiseShift 0.1s steps(1) infinite;
  }
  @keyframes noiseShift {
    0%   { background-position: 0 0; }
    25%  { background-position: 50px 30px; }
    50%  { background-position: -20px 60px; }
    75%  { background-position: 80px -40px; }
    100% { background-position: 0 0; }
  }

  /* Utility animations */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  /* Horizontal streak */
  .streak {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    z-index: 6;
    pointer-events: none;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(59,130,246,0.5) 30%,
      rgba(139,92,246,0.8) 50%,
      rgba(59,130,246,0.5) 70%,
      transparent 100%
    );
    opacity: 0;
    animation: streakPass 6s ease-in-out 3s infinite;
  }
  .streak:nth-child(1) { top: 30%; animation-delay: 3s; }
  .streak:nth-child(2) { top: 70%; animation-delay: 7s; animation-duration: 8s; }
  @keyframes streakPass {
    0%,100% { opacity: 0; transform: scaleX(0); }
    10%      { opacity: 1; transform: scaleX(1); }
    50%      { opacity: 0.3; }
    90%      { opacity: 0; transform: scaleX(1); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .topbar { padding: 1rem 1.5rem; }
    .bottombar { padding: 1rem 1.5rem; }
    .corner { width: 40px; height: 40px; }
    .glass-card:nth-child(1), .glass-card:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="cursor-glow"></div>

<!-- Canvas for particles -->
<canvas id="canvas"></canvas>

<!-- Aurora blobs -->
<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<!-- Grid overlay -->
<div class="grid-overlay"></div>

<!-- Scanlines -->
<div class="scanlines"></div>

<!-- Noise -->
<div class="noise"></div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Light streaks -->
<div class="streak"></div>
<div class="streak"></div>

<!-- Floating glass cards -->
<div class="glass-card"></div>
<div class="glass-card"></div>
<div class="glass-card"></div>
<div class="glass-card"></div>

<!-- Corner brackets -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">System Status</div>
  <div class="timestamp" id="ts"></div>
  <div class="topbar-status">
    <div class="status-dot"></div>
    <span>Offline</span>
  </div>
</div>

<!-- Main stage -->
<div class="stage">
  <div class="headline-wrap">

    <div class="eyebrow">Error 503 — Service Unavailable</div>

    <h1 class="headline glow-text" data-text="THIS SITE&#10;IS CLOSED">
      <span class="hl-line">
        <span class="gl" style="--i:0">T</span><span class="gl" style="--i:1">H</span><span class="gl" style="--i:2">I</span><span class="gl" style="--i:3">S</span><span class="gl" style="--i:4">&nbsp;</span><span class="gl" style="--i:5">S</span><span class="gl" style="--i:6">I</span><span class="gl" style="--i:7">T</span><span class="gl" style="--i:8">E</span>
      </span>
      <span class="hl-line">
        <span class="gl" style="--i:0">I</span><span class="gl" style="--i:1">S</span><span class="gl" style="--i:2">&nbsp;</span><span class="gl" style="--i:3">C</span><span class="gl" style="--i:4">L</span><span class="gl" style="--i:5">O</span><span class="gl" style="--i:6">S</span><span class="gl" style="--i:7">E</span><span class="gl" style="--i:8">D</span>
      </span>
    </h1>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-diamond"></div>
      <div class="div-line"></div>
    </div>

    <div class="subtext">
      <p>This website is currently unavailable.</p>
      <p>Please check back later.</p>
    </div>

  </div>
</div>

<!-- Bottom bar -->
<div class="bottombar">
  <div class="bottombar-text">© 2026 — All Rights Reserved</div>
  <div class="coord-display" id="coords">X: 0000 / Y: 0000</div>
  <div class="bottombar-text">Maintenance Mode Active</div>
</div>

<script>
// ─── TIMESTAMP ────────────────────────────────────────────────────────────────
const tsEl = document.getElementById('ts');
function updateTs() {
  const now = new Date();
  tsEl.textContent = now.toISOString().replace('T',' ').slice(0,19) + ' UTC';
}
updateTs();
setInterval(updateTs, 1000);

// ─── CUSTOM CURSOR ────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursor-ring');
const glow   = document.getElementById('cursor-glow');
const coords = document.getElementById('coords');

let mx = 0, my = 0, rx = 0, ry = 0, glx = 0, gly = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  coords.textContent = `X: ${String(Math.round(mx)).padStart(4,'0')} / Y: ${String(Math.round(my)).padStart(4,'0')}`;
});

// Smooth ring & glow follow
function animCursor() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  glx += (mx - glx) * 0.05;
  gly += (my - gly) * 0.05;
  glow.style.left = glx + 'px';
  glow.style.top  = gly + 'px';
  requestAnimationFrame(animCursor);
}
animCursor();

// ─── PARTICLE CANVAS ──────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.r  = Math.random() * 1.5 + 0.2;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3 - 0.1;
    this.life = 0;
    this.maxLife = Math.random() * 400 + 200;
    const hues = [210, 240, 270, 190];
    this.hue = hues[Math.floor(Math.random() * hues.length)];
    this.sat = 60 + Math.random() * 30;
    this.lum = 60 + Math.random() * 20;
    this.connectable = Math.random() > 0.5;
  }
  update() {
    // Subtle mouse attraction
    const dx = mx - this.x, dy = my - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 180) {
      this.vx += dx / dist * 0.01;
      this.vy += dy / dist * 0.01;
    }
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    if (this.life > this.maxLife || this.x < -10 || this.x > W+10 || this.y < -10 || this.y > H+10) this.reset();
  }
  draw() {
    const alpha = Math.sin(this.life / this.maxLife * Math.PI) * 0.7;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},${this.sat}%,${this.lum}%,${alpha})`;
    ctx.fill();
  }
}

function initParticles() {
  const count = Math.min(Math.floor(W * H / 8000), 180);
  particles = Array.from({ length: count }, () => new Particle());
  // Spread them out in life
  particles.forEach(p => p.life = Math.random() * p.maxLife);
}
initParticles();

function drawConnections() {
  const connectable = particles.filter(p => p.connectable);
  for (let i = 0; i < connectable.length; i++) {
    for (let j = i + 1; j < connectable.length; j++) {
      const a = connectable[i], b = connectable[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 100) {
        const alpha = (1 - d/100) * 0.15;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(59,130,246,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }
}

function animParticles() {
  ctx.clearRect(0, 0, W, H);
  drawConnections();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animParticles);
}
animParticles();

// ─── GLITCH TRIGGER ───────────────────────────────────────────────────────────
// Random extra glitch flicker
const hl = document.querySelector('.headline');
setInterval(() => {
  if (Math.random() > 0.7) {
    hl.style.transform = `translate(${(Math.random()-0.5)*4}px, ${(Math.random()-0.5)*2}px)`;
    setTimeout(() => hl.style.transform = '', 80);
  }
}, 2000);

// ─── PARALLAX ON MOUSE ────────────────────────────────────────────────────────
const stage = document.querySelector('.stage');
document.addEventListener('mousemove', e => {
  const cx = (e.clientX / W - 0.5) * 2;
  const cy = (e.clientY / H - 0.5) * 2;
  stage.style.transform = `translate(${cx * 8}px, ${cy * 5}px)`;
});
</script>
</body>
</html>
